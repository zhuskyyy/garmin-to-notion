name: Sync Garmin to Notion

on:
  schedule:
    - cron: '30 22 * * *' # Daily 8:30am AEST (UTC+10, after daylight saving ended Apr 2026)
  workflow_dispatch:
env:
  TZ: 'Australia/Sydney'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Restore Garmin token cache
        uses: actions/cache@v4
        with:
          path: /tmp/garth_tokens
          key: garmin-tokens-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            garmin-tokens-${{ runner.os }}-

      - name: Run script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ vars.GARMIN_ACTIVITIES_FETCH_LIMIT }}
          TZ: 'America/Montreal'
        run: |
          for i in 1 2 3; do
            python garmin_auth.py && \
            python garmin-activities.py && \
            python personal-records.py && \
            python daily-steps.py && \
            python sleep-data.py && break
            echo "Attempt $i failed, waiting 300s before retry..."
            sleep 300
          done

      - name: Generate daily health brief
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: 'Australia/Sydney'
        run: |
          for i in 1 2 3; do
            python kev_daily_health.py && break
            echo "Attempt $i failed, waiting 300s before retry..."
            sleep 300
          done
